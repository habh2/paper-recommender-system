services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ingest:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    volumes:
      - papers_db:/app/data
    profiles: [pipeline]

  embed:
    build:
      context: .
      dockerfile: embeddings/Dockerfile
    volumes:
      - papers_db:/app/data
      - hf_cache:/root/.cache/huggingface
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    profiles: [pipeline]

  train-topic:
    build:
      context: .
      dockerfile: preference/Dockerfile.train_topic
    volumes:
      - papers_db:/app/data
      - models:/app/preference/models
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    profiles: [pipeline]

  compute-dist:
    build:
      context: .
      dockerfile: preference/Dockerfile.compute_dist
    volumes:
      - papers_db:/app/data
      - models:/app/preference/models
    profiles: [pipeline]

  train-pref:
    build:
      context: .
      dockerfile: preference/Dockerfile.train_pref
    volumes:
      - papers_db:/app/data
      - models:/app/preference/models
    profiles: [pipeline]

  app:
    build:
      context: .
      dockerfile: preference/Dockerfile.app
    ports:
      - "8000:8000"
    volumes:
      - papers_db:/app/data
      - models:/app/preference/models
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  papers_db:
  models:
  hf_cache:

name: CI/CD

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".github/CODEOWNERS"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run unit tests
        run: pytest -m unit -v

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: docker build -t recommender-base -f Dockerfile.base .

      - name: Build pipeline images
        run: docker compose -p recommender-system --profile pipeline build

      - name: Build app image
        run: docker compose -p recommender-system build app

      - name: Push images to GHCR
        run: |
          REGISTRY="ghcr.io/habh2"
          for img in ingest embed train-topic compute-dist train-pref app; do
            docker tag "recommender-system-${img}:latest" "${REGISTRY}/recommender-system-${img}:latest"
            docker push "${REGISTRY}/recommender-system-${img}:latest"
          done
